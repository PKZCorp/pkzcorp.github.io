# Template for a project entry
# Copy this file and rename to [slug].yaml (e.g., interactive-poetry.yaml)

slug: project-slug          # REQUIRED: unique identifier used in URLs. Must be lowercase, no spaces.
title: "Project Title"     # REQUIRED: display name.
category: software          # REQUIRED: one of: game, music, software, poem, art, collab, event, other

description: >-
  REQUIRED: Short project summary.
  Describe what the project is, what it does, or why it exists.

status: wip                 # REQUIRED: one of: planned, released, wip, jam, archived
year: 2026                  # REQUIRED: release or creation year

members:                    # REQUIRED: list of member slugs involved in the project
  - member-slug

thumbnail: /images/projects/project-slug/thumbnail.png  # REQUIRED: project thumbnail image or external image URL

tags:                       # OPTIONAL: searchable tags
  - tag-one
  - tag-two

links:                      # OPTIONAL: external links
  site: https://example.com
  github: https://github.com/pkzcorp/project-slug

images:                     # OPTIONAL: gallery images
  - /images/projects/project-slug/01.png
  - /images/projects/project-slug/02.png

jam: jam-slug               # OPTIONAL: related jam slug if the project came from a jam
