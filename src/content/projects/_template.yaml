# Template for a project entry
# Copy this file and rename to [slug].yaml (e.g., my-game.yaml)

slug: project-slug          # REQUIRED: unique identifier for URL. Example: my-game, poetry-collection
title: "Project Title"      # REQUIRED: display name
category: game              # REQUIRED: one of: game, music, software, poem, art, collab, other

description: >
  REQUIRED: Full project description (multiple paragraphs).
  Explain what it is, how it was made, technologies used,
  inspiration, release status, anything visitors should know.

tags:                       # OPTIONAL: custom tags for filtering (e.g., pygame, puzzle, collaborative)
  - tag-1
  - tag-2

status: released            # REQUIRED: one of: released, wip, jam, archived
year: 2025                  # REQUIRED: year of release or creation

members:                    # REQUIRED: list of member slugs who worked on this
  - member-slug-1
  - member-slug-2

thumbnail: /assets/projects/project-slug/thumb.png  # REQUIRED: project thumbnail (16:9 aspect ratio)

images:                     # OPTIONAL: gallery images
  - /assets/projects/project-slug/image1.png
  - /assets/projects/project-slug/image2.png

links:                      # OPTIONAL: where to access/play/download the project
  play: https://itch.io/...
  source: https://github.com/...
  download: https://...

jam: jam-slug               # OPTIONAL: if this project came from a jam, reference the jam slug here

# Assets should be stored in public/assets/projects/[slug]/
